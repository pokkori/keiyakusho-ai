name: Quality Check CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  issue_comment:
    types: [created]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://example.com

      - name: Emoji scan (JSX禁止)
        run: |
          EMOJI_PATTERN='[🔥😊🎯🚀💡🎉✨🌟💪🎊❤️💔🙏👍👎😂🤣😍🥰😘😭😢😤😡🤯🥺😱😨]'
          if grep -rnP "$EMOJI_PATTERN" app/ --include="*.tsx" --include="*.ts" --include="*.jsx" 2>/dev/null; then
            echo "FAIL: Emoji found in source files"
            exit 1
          fi
          echo "PASS: No emoji in source"

      - name: Check aria-label coverage
        run: |
          MISSING=$(grep -rn '<button\b\|<Button\b' app/ --include="*.tsx" --include="*.jsx" 2>/dev/null | grep -v 'aria-label' | wc -l)
          echo "Buttons potentially missing aria-label: $MISSING"
          if [ "$MISSING" -gt 20 ]; then
            echo "WARNING: Too many buttons missing aria-label (threshold: 20)"
          fi

      - name: Check llms.txt exists
        run: |
          if [ ! -f "public/llms.txt" ]; then
            echo "WARNING: public/llms.txt not found (GEO対策)"
          else
            echo "PASS: llms.txt exists"
          fi

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/nextjs
            p/owasp-top-ten
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  claude-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            このPRを日本語でレビューしてください。
            以下の観点で確認し、問題点があればコメントしてください:
            1. TypeScriptの型安全性
            2. セキュリティ（XSS・認証・入力バリデーション）
            3. パフォーマンス（不要なre-render・大きなbundle）
            4. Next.js 15/16のベストプラクティス準拠
            問題なければ「LGTM」とコメントしてください。
          claude_args: "--max-turns 5 --model claude-haiku-4-5-20251001"

  e2e:
    runs-on: ubuntu-latest
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6, 7, 8]
        shardTotal: [8]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://example.com
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge Playwright blob reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 14

  k6-smoke:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke test (local build)
        run: |
          npm ci
          npm run build
          npm run start &
          sleep 10
          k6 run tests/k6/smoke.js --env BASE_URL=http://localhost:3000
        env:
          CI: true
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://example.com
